<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Astra Stage Login</title><link rel="stylesheet" href="/assets/styles.css"></head><body><main class="login"><div class="brand">Astra <em>Culture</em></div><h1>Private stage access</h1><p class="sub">This view contains attendee submissions and private briefing notes.</p><form id="login"><div class="field"><label>Stage password</label><input name="password" type="password" autocomplete="current-password" required></div><button class="stage-button">Unlock stage view</button><div class="error" id="error"></div></form></main><script>document.querySelector('#login').onsubmit=async e=>{e.preventDefault();const r=await fetch('/api/stage/login',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(Object.fromEntries(new FormData(e.currentTarget))) });const d=await r.json();if(r.ok)location.href='/stage';else document.querySelector('#error').textContent=d.error}</script></body></html>
