<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Astra Projector View</title><link rel="stylesheet" href="/assets/styles.css"></head><body><main class="projector" id="projector"></main><script>const id=location.pathname.split('/').pop();fetch('/api/submission/'+id).then(async r=>({ok:r.ok,data:await r.json()})).then(({ok,data})=>{if(!ok)throw new Error(data.error);document.querySelector('#projector').innerHTML=data.projectorHtml}).catch(e=>document.querySelector('#projector').textContent=e.message)</script></body></html>
